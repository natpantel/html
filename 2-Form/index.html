<!DOCTYPE html>
<html>

<head>
    <title>Регистрация</title>
</head>

<body>
    <div>
        <h1>Регистрация</h1>
        <p>Уже есть аккаунт? <a href="#">Войти</a></p>
        <input type="text" placeholder="Имя пользователя" name="username">
        <input type="text" placeholder="Имя" name="first_name">
        <input type="text" placeholder="Фамилия" name="last_name">
        <input type="email" placeholder="E-mail" name="email">
        <button type="submit" method="post">Зарегистрироваться</button>
        <input type="checkbox" id="terms" name="terms">
        <label for="terms">Я прочитал и принимаю <a href="#">Условия использования</a></label>
    </div>
</body>

</html>
